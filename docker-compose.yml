version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: quiz-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: quizgame
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - quiz-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quiz-backend
    restart: unless-stopped
    environment:
      PORT: 3001
      MONGODB_URI: mongodb://mongodb:27017/quizgame
      FRONTEND_URL: http://localhost:3000
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
    ports:
      - "3001:3001"
    depends_on:
      - mongodb
    networks:
      - quiz-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quiz-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - quiz-network

volumes:
  mongodb_data:

networks:
  quiz-network:
    driver: bridge
